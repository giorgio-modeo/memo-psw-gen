<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione dizionari · Generatore di password mnemoniche</title>
<meta name="description" content="Crea e modifica le liste di parole usate dal generatore di password mnemoniche. Tutto resta salvato solo nel tuo browser.">
<meta name="theme-color" content="#111111">
<link rel="canonical" href="https://giorgio-modeo.github.io/memo-psw-gen/dictionaries.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Gestione dizionari · Generatore di password mnemoniche">
<meta property="og:description" content="Crea e modifica le liste di parole usate dal generatore di password mnemoniche.">
<meta property="og:url" content="https://giorgio-modeo.github.io/memo-psw-gen/dictionaries.html">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="wrap">

  <div class="ed-header">
    <a class="back-link" href="index.html" data-i18n="ed_back">← Torna al generatore</a>
    <select class="lang-select" id="uiLang" aria-label="Interface language"></select>
  </div>

  <h1 data-i18n="ed_title" style="font-size:clamp(20px,4vw,28px);font-weight:700;letter-spacing:-.02em;margin-bottom:6px"></h1>
  <p class="sub" data-i18n="ed_sub" style="margin-bottom:24px"></p>

  <!-- Parole fisse -->
  <div class="ed-section">
    <div class="ed-section-title" data-i18n="pinned_label"></div>
    <p class="hint" data-i18n="pinned_hint" style="margin-bottom:12px;font-size:12.5px;color:var(--ink-faint)"></p>
    <div class="word-list" id="pinnedList"></div>
    <div class="add-row" style="margin-top:4px">
      <input type="text" id="pinnedInput" data-i18n-placeholder="pinned_add_ph">
      <button class="add-btn" id="pinnedAdd" data-i18n="ed_add"></button>
    </div>
  </div>

  <!-- Dizionari -->
  <div class="ed-section">
    <div class="ed-section-title" data-i18n="ed_dict"></div>
    <div class="dict-tabs" id="dictTabs"></div>
    <div id="dictEditor"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="dictionaries/ita_dictionary.js"></script>
<script src="dictionaries/eng_dictionary.js"></script>
<script src="js/config.js"></script>
<script src="i18n/i18n.js"></script>
<script src="js/store.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
