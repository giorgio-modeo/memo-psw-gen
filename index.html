<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generatore di password mnemoniche sicure e facili da ricordare</title>
<meta name="description" content="Genera password mnemoniche sicure con catene di parole casuali (stile Diceware / correct-horse-battery-staple). Stima dell'entropia in tempo reale, italiano e inglese. Tutto resta nel browser: niente tracciamento, niente server.">
<meta name="keywords" content="generatore password, password mnemoniche, passphrase, diceware, password sicure, entropia, crypto.getRandomValues, password facili da ricordare">

<meta name="robots" content="index, follow">
<meta name="theme-color" content="#111111">
<link rel="canonical" href="https://giorgio-modeo.github.io/memo-psw-gen/">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Generatore di password mnemoniche">
<meta property="og:title" content="Generatore di password mnemoniche sicure e facili da ricordare">
<meta property="og:description" content="Password mnemoniche sicure da catene di parole casuali, con stima dell'entropia in tempo reale. Italiano e inglese, 100% nel browser.">
<meta property="og:url" content="https://giorgio-modeo.github.io/memo-psw-gen/">

<meta property="og:locale:alternate" content="en_US">
<meta property="og:image" content="https://giorgio-modeo.github.io/memo-psw-gen/og-image.png">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Generatore di password mnemoniche sicure e facili da ricordare">
<meta name="twitter:description" content="Password mnemoniche sicure da catene di parole casuali, con stima dell'entropia in tempo reale. Italiano e inglese, 100% nel browser.">
<meta name="twitter:image" content="https://giorgio-modeo.github.io/memo-psw-gen/og-image.png">

<link rel="icon" href="favicon.ico" sizes="any">
<link rel="stylesheet" href="css/styles.css">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Generatore di password mnemoniche",
  "url": "https://giorgio-modeo.github.io/memo-psw-gen/",
  "description": "Genera password mnemoniche sicure con catene di parole casuali (stile Diceware). Stima dell'entropia in tempo reale, italiano e inglese. Tutto resta nel browser: niente tracciamento, niente server.",
  "applicationCategory": "SecurityApplication",
  "operatingSystem": "Any (browser)",
  "browserRequirements": "Requires JavaScript",
  "inLanguage": ["it", "en"],
  "isAccessibleForFree": true,
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "EUR"
  },
  "author": {
    "@type": "Person",
    "name": "Giorgio Modeo"
  }
}
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="top">
      <div>
        <div class="eyebrow" data-i18n="eyebrow">Parole → Password</div>
        <h1 data-i18n="title">Generatore di password mnemoniche</h1>
      </div>
      <select class="lang-select" id="uiLang" aria-label="Interface language"></select>
    </div>
    <p class="sub" data-i18n="sub">Catene di parole casuali: una password che la testa ricorda e una macchina fatica a indovinare.</p>
    <button class="gen" id="gen" data-i18n="gen"></button>
  </header>

  <div class="output">
    <div class="pwd-wrap">
      <div class="pwd" id="pwd" aria-live="polite"></div>
      <div class="pwd-divider"></div>
      <button class="btn-icon" id="copy" data-i18n-title="copy" title="Copia">&#10697;</button>
    </div>

    <span class="chars-info"><b id="chars">0</b> <span data-i18n="unit_chars">caratteri</span></span>

    <div class="meters">
      <div class="meter">
        <div class="meter-head">
          <span class="meter-name" data-i18n="meter_dict" data-i18n-title="meter_dict_hint"></span>
          <span class="meter-verdict" id="v-dict">&mdash;</span>
        </div>
        <div class="bar"><i id="bar-dict"></i></div>
        <div class="meter-foot"><b id="bits-dict">0</b> bit &middot; <span data-i18n="ct_label"></span> <b id="ct-dict">&mdash;</b></div>
      </div>
      <div class="meter">
        <div class="meter-head">
          <span class="meter-name" data-i18n="meter_brute" data-i18n-title="meter_brute_hint"></span>
          <span class="meter-verdict" id="v-brute">&mdash;</span>
        </div>
        <div class="bar"><i id="bar-brute"></i></div>
        <div class="meter-foot"><b id="bits-brute">0</b> bit &middot; <span data-i18n="ct_label"></span> <b id="ct-brute">&mdash;</b></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="row col">
      <div class="row-text between">
        <div>
          <div class="label" data-i18n="lang_label"></div>
          <div class="hint" data-i18n="lang_hint"></div>
        </div>
        <a class="manage-link" href="dictionaries.html" data-i18n="manage"></a>
      </div>
      <div class="tags" id="langs" role="group"></div>
    </div>

    <div class="row col">
      <div class="row-text">
        <div class="label" data-i18n="topic_label"></div>
        <div class="hint" data-i18n="topic_hint"></div>
      </div>
      <div class="chips" id="topics" role="group"></div>
    </div>

    <div class="row">
      <div class="row-text">
        <div class="label" data-i18n="words_label"></div>
        <div class="hint" data-i18n="words_hint"></div>
      </div>
      <div class="slider-box">
        <input type="range" id="words" min="1" max="8" value="4">
        <span class="count" id="wordsVal">4</span>
      </div>
    </div>

    <div class="row">
      <div class="row-text"><div class="label" data-i18n="sep_label"></div></div>
      <div class="seg" id="sep" role="group">
        <button data-v="-" aria-pressed="true">-</button>
        <button data-v=".">.</button>
        <button data-v="_">_</button>
        <button data-v=" " data-i18n="sep_space"></button>
        <button data-v="num">123</button>
        <button data-v="" data-i18n="sep_none"></button>
      </div>
    </div>

    <div class="row">
      <div class="row-text"><div class="label" data-i18n="caps_label"></div></div>
      <div class="seg" id="caps" role="group">
        <button data-v="none" aria-pressed="true" data-i18n="caps_none"></button>
        <button data-v="first" data-i18n="caps_first"></button>
        <button data-v="random" data-i18n="caps_random"></button>
        <button data-v="all" data-i18n="caps_all"></button>
      </div>
    </div>

    <div class="row">
      <div class="row-text">
        <div class="label" data-i18n="num_label"></div>
        <div class="hint" data-i18n="num_hint"></div>
      </div>
      <label class="tog"><input type="checkbox" id="addNum" checked><span></span></label>
    </div>

    <div class="row">
      <div class="row-text">
        <div class="label" data-i18n="sym_label"></div>
        <div class="hint"><code>! ? @ # $ % &amp; * + = _</code></div>
      </div>
      <label class="tog"><input type="checkbox" id="addSym"><span></span></label>
    </div>

    <div class="row">
      <div class="row-text"><div class="label" data-i18n="pos_label"></div></div>
      <div class="seg" id="pos" role="group">
        <button data-v="end" aria-pressed="true" data-i18n="pos_end"></button>
        <button data-v="inside" data-i18n="pos_inside"></button>
      </div>
    </div>

    <div class="row hidden" id="amountRow">
      <div class="row-text">
        <div class="label" data-i18n="amount_label"></div>
        <div class="hint" data-i18n="amount_hint"></div>
      </div>
      <div class="slider-box">
        <input type="range" id="amount" min="1" max="8" value="2">
        <span class="count" id="amountVal">2</span>
      </div>
    </div>

    <div class="row">
      <div class="row-text">
        <div class="label" data-i18n="maxlen_label"></div>
        <div class="hint" data-i18n="maxlen_hint"></div>
      </div>
      <div class="seg" id="maxlen" role="group">
        <button data-v="0" aria-pressed="true" data-i18n="maxlen_off"></button>
        <button data-v="12">12</button>
        <button data-v="16">16</button>
        <button data-v="20">20</button>
        <button data-v="24">24</button>
      </div>
    </div>
  </div>

  <footer>
    <span data-i18n="foot1"></span> <code>crypto.getRandomValues</code>. <span data-i18n="foot2"></span> <b id="poolInfo">&mdash;</b>.
    <span data-i18n="foot3"></span>
  </footer>
</div>

<!-- dati -> config -> store -> traduzioni -> logica -->
<script src="dictionaries/ita_dictionary.js"></script>
<script src="dictionaries/eng_dictionary.js"></script>
<script src="js/config.js"></script>
<script src="i18n/i18n.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
</body>
</html>
